media: src/assets/img
content:
  - name: site
    label: Site Settings
    path: src/content/data/site.json
    type: file
    fields:
      - { name: title, label: Browser tab title, type: string }
      - { name: description, label: Meta description, type: string }
      - { name: author, label: Author name, type: string }
      - { name: location, label: Location, type: string }
      - { name: coords, label: Coordinates, type: string }
      - { name: established, label: Established year, type: string }
      - { name: year, label: Current year, type: string }

  - name: home
    label: Homepage Content
    path: src/content/data/home.json
    type: file
    fields:
      - name: nav
        label: Navigation
        type: object
        fields:
          - { name: mark, label: Brand mark (top-left), type: string }
          - name: links
            label: Menu links
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - { name: right, label: Right-side text, type: string }

      - name: hero
        label: Hero Section
        type: object
        fields:
          - { name: name_line_1, label: Name line 1, type: string }
          - { name: name_line_2, label: Name line 2, type: string }
          - { name: sub, label: Subtitle (HTML allowed, use <br> for line break), type: text }
          - { name: pill, label: Pill (top-right badge), type: string }
          - { name: meta_left, label: Meta left (coords), type: string }
          - { name: meta_right, label: Meta right (established), type: string }

      - name: loader
        label: Loader screen
        type: object
        fields:
          - { name: word_1, label: Word 1, type: string }
          - { name: word_2, label: Word 2, type: string }
          - { name: sub, label: Subtitle, type: string }

      - name: manifesto
        label: Manifesto Section
        type: object
        fields:
          - { name: title, label: Title (HTML allowed), type: text }
          - name: body
            label: Opening paragraphs
            type: string
            list: true
          - { name: pullquote, label: Pullquote, type: string }
          - name: body_after
            label: Closing paragraphs
            type: string
            list: true

      - name: signature_band_1
        label: Signature Band I
        type: object
        fields:
          - { name: corner_kicker, label: Corner kicker, type: string }
          - { name: corner_name, label: Corner name, type: string }
          - { name: word, label: Main word, type: string }
          - { name: meta, label: Meta text (HTML allowed), type: text }

      - name: contact
        label: Contact Section
        type: object
        fields:
          - { name: headline, label: Headline, type: string }
          - { name: email, label: Email, type: string }
          - { name: phone_display, label: Phone (display), type: string }
          - { name: phone_href, label: Phone (tel link), type: string }

      - name: colophon
        label: Colophon (footer)
        type: object
        fields:
          - { name: left, label: Left text, type: string }
          - { name: right, label: Right text, type: string }

      - name: tweaks
        label: Advanced · Display Tweaks
        type: object
        fields:
          - { name: palette, label: Palette, type: select, options: { values: ['ink', 'bone'] } }
          - { name: accent, label: Accent color, type: select, options: { values: ['ember', 'oxblood', 'forest'] } }
          - { name: display, label: Display font, type: select, options: { values: ['cormorant', 'playfair', 'didot'] } }
          - { name: grain, label: Show grain texture, type: boolean }
          - { name: cursor, label: Show cursor lens, type: boolean }

  - name: case_studies
    label: Case Studies
    path: src/content/case-studies
    filename: '{slug}.md'
    type: collection
    view:
      fields: [title, frame, order]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: URL slug (url-safe, no spaces), type: string, required: true, pattern: '^[a-z0-9-]+$' }
      - { name: order, label: 'Order (lower = shown first)', type: number, required: true }
      - { name: case_num, label: 'Case number (e.g. "Case 01")', type: string }
      - { name: frame, label: Frame (subheading), type: string }
      - { name: tagline, label: Tagline (one-line summary), type: string }
      - { name: deck, label: Deck (opening paragraph), type: text }
      - { name: row_image, label: Selected Work row image (optional), type: image }
      - { name: row_image_caption, label: Row image caption, type: string }
      - { name: hero_image, label: Case study hero image (optional), type: image }
      - { name: hero_caption, label: Hero caption, type: string }

      - name: facts
        label: Facts strip
        type: object
        list: true
        fields:
          - { name: key, label: Label, type: string }
          - { name: value, label: Value, type: string }

      - name: chapters
        label: Chapters
        type: object
        list: true
        fields:
          - { name: num, label: 'Chapter number (e.g. "I. The Brief")', type: string }
          - { name: lead, label: Lead line (italic sidebar), type: string }
          - { name: body, label: Body text (Markdown supported), type: text }
          - { name: pullquote, label: Pullquote (optional), type: string }

      - name: credits
        label: Credits
        type: object
        list: true
        fields:
          - { name: key, label: Label, type: string }
          - { name: value, label: Value, type: string }

      - { name: body, label: 'Body (unused, ignore)', type: text, hidden: true }
