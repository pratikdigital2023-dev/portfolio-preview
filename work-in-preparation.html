<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>In Preparation · Pratik Sengupta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%; background:#131211; color:#efe8d8;
  font-family:"Cormorant Garamond","Didot",Georgia,serif;
  -webkit-font-smoothing:antialiased;
}
.return{
  position:fixed; top:28px; left:44px;
  font-family:"JetBrains Mono",monospace; font-size:10.5px;
  letter-spacing:.24em; text-transform:uppercase;
  color:#8a3b18;
  text-decoration:none;
  opacity:0; animation: fadeIn .8s .3s ease forwards;
}
.return:hover{ color:#b4542d; }
.center{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; text-align:center; padding:20px;
  gap:20px;
}
.word{
  font-style:italic; font-weight:300;
  font-size:clamp(48px,9vw,96px);
  line-height:1; letter-spacing:-.015em;
  color:#efe8d8;
  opacity:0; animation: riseIn 1.1s .5s cubic-bezier(.2,.8,.15,1) forwards;
}
.date{
  font-family:"JetBrains Mono",monospace; font-size:11px;
  letter-spacing:.24em; text-transform:uppercase; font-variant:small-caps;
  color:rgba(239,232,216,.5);
  opacity:0; animation: fadeIn .8s 1.1s ease forwards;
}
@keyframes riseIn{
  from{ opacity:0; transform:translateY(24px); }
  to  { opacity:1; transform:none; }
}
@keyframes fadeIn{
  from{ opacity:0; } to{ opacity:1; }
}
</style>
</head>
<body>
<a class="return" href="index.html">&larr; Return</a>
<div class="center">
  <div class="word">In preparation.</div>
  <div class="date">Expected &middot; June 2026</div>
</div>
</body>
</html>
